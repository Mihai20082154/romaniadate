kind = "web"
previewPath = "/"
title = "RomaniaDate"
version = "1.0.0"
id = "artifacts/dating-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25129
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dating-app run dev"

[services.env]
PORT = "25129"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dating-app", "run", "build"]
publicDir = "artifacts/dating-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
